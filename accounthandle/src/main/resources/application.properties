# =====================================================
# Application
# =====================================================
spring.application.name=accounthandle
server.port=8081

# =====================================================
# MySQL Configuration
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/account_service
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA Configuration
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# Eureka Client
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =====================================================
# Spring Boot Actuator
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =====================================================
# Logging
# =====================================================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.traceledger.account=DEBUG

# =====================================================
# Graceful Shutdown (Production Ready)
# =====================================================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s